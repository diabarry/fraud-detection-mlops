data:
  path: "data/creditcard.csv"
  target: "Class"
  test_size: 0.2
  raw_data_name: "raw_credit_card_data" # For DVC/Great Expectations versioning

model:
  name: "xgboost_fraud_detector"
  params:
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.1
    objective: "binary:logistic"
    eval_metric: "aucpr" # Focus on Precision-Recall (Area Under Curve)
  store_path: "models/"
  scaler_path: "models/scaler.pkl"
  model_path: "models/model.pkl"

mlflow:
  experiment_name: "fraud-detection-production"

monitoring:
  drift_report_path: "monitoring/reports/"
  threshold_pr_auc: 0.80 # Alert threshold for model degradation